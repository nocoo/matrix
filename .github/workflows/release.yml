# Matrix CD
# - Tag push (v*.*.*) → deploy-tagged: strict version match
# - CI green on main   → deploy-main:    continuous deploy of latest main
# - workflow_dispatch  → deploy-tagged: manual redeploy of a specific tag
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────────────
  # Tagged release: enforces tag == package.json version
  # ─────────────────────────────────────────────────────
  deploy-tagged:
    name: Deploy Worker (tagged)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "❌ Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build site (into dist)
        run: bun run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Summary
        if: always()
        run: |
          {
            echo "### Matrix Release ${{ steps.ver.outputs.tag }}"
            echo ""
            echo "- Trigger: tagged (\`${{ github.event_name }}\`)"
            echo "- Worker: deployed to \`theme-matrix\` (production)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────
  # Continuous deploy: main push, gated by CI success
  # ─────────────────────────────────────────────────────
  deploy-main:
    name: Deploy Worker (main)
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout main HEAD that CI validated
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read package.json version
        id: ver
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build site (into dist)
        run: bun run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Summary
        if: always()
        run: |
          {
            echo "### Matrix Continuous Deploy"
            echo ""
            echo "- Trigger: main push (CI gated)"
            echo "- SHA: \`${{ steps.ver.outputs.sha }}\`"
            echo "- Version: \`${{ steps.ver.outputs.version }}\`"
            echo "- Worker: \`theme-matrix\`"
          } >> "$GITHUB_STEP_SUMMARY"
